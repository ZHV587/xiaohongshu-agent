name: CI

# 让权限/ACL 等 117 个挂在 migrated_conn 上的测试**真跑**:起 Postgres 容器并设
# TEST_XHS_DATABASE_URL。本机不设该变量时这些测试默认 skip(开发者本地全绿 ≠ 验证过权限),
# CI 必须把它们跑起来,否则越权防护在回归里形同虚设。

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        # 标准 postgres 自带 contrib(pgcrypto/pg_trgm);conftest 会剥掉 vector 扩展、
        # 用 plpgsql 模拟 <=> 余弦距离,故无需 pgvector 镜像即可跑全部 DB 测试。
        image: postgres:16
        env:
          POSTGRES_USER: xhs_user
          POSTGRES_PASSWORD: xhs_pass
          POSTGRES_DB: xhs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xhs_user -d xhs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # 关键:设这个变量,migrated_conn 的 117 个 ACL/权限测试才会真执行而非 skip。
      TEST_XHS_DATABASE_URL: postgresql://xhs_user:xhs_pass@localhost:5432/xhs_test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      # 装 node 22(支持 --experimental-strip-types 直接跑 jwt.ts),让 JWT 跨语言契约测试
      # 真跑而非 skip —— 防前端 jwt.ts 与后端 auth.py 的 HS256 口径单侧漂移。
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run full test suite (DB tests included)
        # 跑全量;DB 测试因 TEST_XHS_DATABASE_URL 已设而真执行。
        run: uv run pytest -q

  # 完全自带 fixture 的 UI 契约在本地 Next 拓扑运行；不得依赖真实后端 Secret。
  web-ui-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: web
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - name: Build web application
        run: pnpm build
        working-directory: web
      - name: Assemble standalone static assets
        working-directory: web
        shell: bash
        run: |
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
      - name: Run local fixture UI E2E
        run: pnpm run test:e2e:ui
        working-directory: web

  # studio-data 端到端真实后端基线门禁(与 python-tests 并列、互相独立)。
  # skip/fail 语义分离:真实后端数据/凭据不可用 → 前置 test.skip → Playwright 退出码 0 →
  # 作业成功但在运行摘要记「当前数据不足」;代码缺陷或基础设施故障使其非 0 退出 → 作业失败 → 阻断合并。
  # 秘钥经仓库 Secrets 注入,指向具备飞书数据的真实后端。
  web-e2e-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: web
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - name: Run studio-data E2E baseline (gated)
        working-directory: web
        shell: bash
        env:
          XHS_E2E_BASE_URL: ${{ secrets.XHS_E2E_BASE_URL }}
          XHS_JWT_SECRET: ${{ secrets.XHS_JWT_SECRET }}
          XHS_E2E_OPEN_ID: ${{ secrets.XHS_E2E_OPEN_ID }}
          XHS_E2E_USER_NAME: ${{ secrets.XHS_E2E_USER_NAME }}
        run: |
          # 捕获输出以便区分 skipped/failed;PIPESTATUS[0] 取 Playwright 真实退出码。
          pnpm run test:e2e:studio 2>&1 | tee playwright-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "### web-e2e-baseline:失败(退出码 ${status})—— 阻断合并" >> "$GITHUB_STEP_SUMMARY"
            exit "$status"
          fi
          if grep -q "当前数据不足" playwright-output.log || grep -Eq "[1-9][0-9]* skipped" playwright-output.log; then
            echo "### web-e2e-baseline:当前数据不足" >> "$GITHUB_STEP_SUMMARY"
            echo "真实后端数据/凭据不可用,studio-data 基线用例已全部跳过(退出码 0,不阻断合并)。" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### web-e2e-baseline:通过 —— studio-data 基线已针对真实后端执行。" >> "$GITHUB_STEP_SUMMARY"
          fi
