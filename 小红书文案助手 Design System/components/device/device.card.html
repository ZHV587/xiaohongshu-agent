<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--background); font-family: var(--font-sans); color: var(--text-body); padding: 24px; }
  .wrap { display: flex; gap: 32px; align-items: flex-start; }
  .lbl { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { PhoneFrame, NoteCard } = window.DesignSystem_71831b;
  const IMG = "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?auto=format&fit=crop&w=400&q=80";

  function Demo() {
    return (
      <div className="wrap">
        <div>
          <div className="lbl">PhoneFrame — feed</div>
          <PhoneFrame width={240}>
            <div style={{ paddingTop: 30, height: "100%", background: "var(--oats-dark)", boxSizing: "border-box", overflow: "hidden" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, padding: 6 }}>
                <NoteCard image={IMG} title="精致露营「搬家式」装备清单" author="张潇潇" authorInitial="Z" likes="1.2k" />
                <NoteCard dim ratio="4 / 5" />
                <NoteCard dim ratio="1 / 1" />
                <NoteCard dim ratio="3 / 4" />
              </div>
            </div>
          </PhoneFrame>
        </div>
        <div>
          <div className="lbl">NoteCard</div>
          <div style={{ width: 150 }}>
            <NoteCard image={IMG} title="精致露营「搬家式」装备清单 必带好物" author="张潇潇" authorInitial="Z" likes="1.2k" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
