<!-- @dsCard group="Components" viewport="700x330" name="Forms — Input, Textarea, Select" subtitle="Field shell: oats rest, coral focus ring" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--background); font-family: var(--font-sans); color: var(--text-body); padding: 24px; }
  .lbl { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 8px; }
  .col { max-width: 460px; display: flex; flex-direction: column; gap: 18px; }
  kbd { font-size: 10px; background: var(--oats-light); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Textarea, Select, Button } = window.DesignSystem_71831b;
  const Ico = ({ n, s = 16 }) => <i data-lucide={n} style={{ width: s, height: s }}></i>;

  function Demo() {
    React.useEffect(() => window.lucide && window.lucide.createIcons(), []);
    return (
      <div className="col">
        <div>
          <div className="lbl">Input</div>
          <Input placeholder="输入命令或搜索动作..." leadingIcon={<Ico n="search" />} trailing={<kbd>ESC</kbd>} />
        </div>
        <div>
          <div className="lbl">Textarea + footer</div>
          <Textarea
            rows={3}
            defaultValue="帮我按露营装备方向出选题，并从飞书多维表格中筛选高赞的爆款。"
            footer={<>
              <Button variant="ghost" size="sm">Ctrl+P 润色工具箱</Button>
              <Button variant="primary" size="sm" rightIcon={<Ico n="send" s={14} />}>生成</Button>
            </>}
          />
        </div>
        <div>
          <div className="lbl">Select</div>
          <Select options={[
            "小红书文案运营审核群 (oc_chat_10293)",
            "露营项目内容策划小组 (oc_chat_88301)",
            "博主内容备份群 (oc_chat_73229)",
          ]} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
