<!-- @dsCard group="Components" viewport="700x320" name="Data — StatCard & 数据回填" subtitle="Engagement metric tiles with trend, plus editable backfill" -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--background); font-family: var(--font-sans); color: var(--text-body); padding: 24px; }
  .lbl { font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-subtle); margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatCard } = window.DesignSystem_71831b;
  const Ico = ({ n, s = 15 }) => <i data-lucide={n} style={{ width: s, height: s }}></i>;

  function Demo() {
    const [views, setViews] = React.useState("12480");
    React.useEffect(() => window.lucide && window.lucide.createIcons(), [views]);
    return (
      <div>
        <div className="lbl">数据看板</div>
        <div className="grid" style={{ marginBottom: 22 }}>
          <StatCard label="点赞" value="1.2k" delta={18} tone="coral" icon={<Ico n="heart" />} />
          <StatCard label="收藏" value="864" delta={32} tone="success" icon={<Ico n="star" />} />
          <StatCard label="评论" value="207" delta={-4} icon={<Ico n="message-square" />} />
          <StatCard label="新增粉丝" value="312" unit="人" delta={26} tone="topic" icon={<Ico n="user-plus" />} />
        </div>
        <div className="lbl">数据回填（手动录入实际表现）</div>
        <div className="grid">
          <StatCard label="实际浏览量" value={views} editable onValueChange={setViews} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
