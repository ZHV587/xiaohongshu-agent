<!-- @dsCard group="Brand" viewport="700x230" name="Voice & Tone" subtitle="Operator-facing UI is calm & precise; generated copy is 小红书-native." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 20px; color: var(--charcoal-default); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col h4 { margin: 0 0 8px; font-size: 11px; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--text-subtle); }
  .ex { font-size: 12px; line-height: var(--leading-relaxed); padding: 10px 12px; border-radius: var(--radius-md); background: var(--oats-light); border: 1px solid var(--border); }
  .ex.gen { background: var(--accent-surface); border-color: var(--border-coral); }
  .tag { color: var(--topicblue-default); }
</style>
</head>
<body>
<div class="grid">
  <div class="col">
    <h4>产品 UI 文案 · 冷静克制</h4>
    <div class="ex">已成功连接并解析飞书多维表格 (45 条数据)<br/>正在计算博主点赞权重并提炼选题规律…<br/>表格同步成功！已写入第 4 行</div>
  </div>
  <div class="col">
    <h4>生成内容 · 小红书原生</h4>
    <div class="ex gen">夏天太适合露营啦！⛺ 今天盘点我私藏的搬家式好物，少带一件体验感都打折！✨<br/><span class="tag">#精致露营 #户外好物 #露营清单</span></div>
  </div>
</div>
</body>
</html>
