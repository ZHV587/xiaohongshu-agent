<!-- @dsCard group="Brand" viewport="700x180" name="Elevation" subtitle="Light, warm-tinted shadows. Coral glow only on primary CTAs." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--oats-default); font-family: var(--font-sans); padding: 26px; }
  .row { display: flex; gap: 22px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 88px; height: 64px; background: #fff; border-radius: var(--radius-md); }
  .lbl { font-size: 10px; font-family: var(--font-mono); color: var(--charcoal-light); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm · cards</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  <div class="item"><div class="box" style="background:var(--coral-500);box-shadow:var(--shadow-coral)"></div><span class="lbl">coral glow</span></div>
</div>
</body>
</html>
