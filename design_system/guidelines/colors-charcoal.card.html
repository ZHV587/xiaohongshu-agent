<!-- @dsCard group="Colors" viewport="700x150" name="Charcoal — Ink" subtitle="Text & dark surfaces. Body text never pure black." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; height: 90px; color: #fff; }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 10px; font-family: var(--font-mono); opacity: 0.65; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--charcoal-dark)"><span class="name">charcoal-dark</span><span class="hex">#0f0f10</span></div>
  <div class="sw" style="background:var(--charcoal-default)"><span class="name">charcoal · body</span><span class="hex">#1a1a1c</span></div>
  <div class="sw" style="background:var(--charcoal-light)"><span class="name">charcoal-light · muted</span><span class="hex">#5e5e62</span></div>
  <div class="sw" style="background:var(--gray-400)"><span class="name">subtle</span><span class="hex">#a1a09a</span></div>
</div>
</body>
</html>
