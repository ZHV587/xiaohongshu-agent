<!-- @dsCard group="Brand" viewport="700x180" name="Logo Lockup" subtitle="🍠 sweet-potato glyph on coral, with the Outfit wordmark." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-display); padding: 26px; color: var(--charcoal-default); }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .mark { width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--coral-brand); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow-coral); }
  .word { font-weight: 800; font-size: var(--text-xl); letter-spacing: var(--tracking-tight); }
  .ver { font-family: var(--font-sans); font-size: 11px; font-weight: 400; color: var(--text-subtle); margin-left: 8px; }
  .alt { display: flex; gap: 14px; margin-top: 22px; align-items: center; }
  .mark-sm { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
</style>
</head>
<body>
<div class="lockup">
  <div class="mark">🍠</div>
  <div class="word">小红书文案助手<span class="ver">v1.2 工作台</span></div>
</div>
<div class="alt">
  <div class="mark-sm" style="background:var(--coral-brand)">🍠</div>
  <div class="mark-sm" style="background:var(--accent-surface)">🍠</div>
  <div class="mark-sm" style="background:var(--charcoal-default)">🍠</div>
  <span style="font-family:var(--font-sans);font-size:11px;color:var(--text-subtle)">App-icon variants · coral / tint / charcoal</span>
</div>
</body>
</html>
