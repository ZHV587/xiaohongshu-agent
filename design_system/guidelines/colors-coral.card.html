<!-- @dsCard group="Colors" viewport="700x150" name="Coral — Primary" subtitle="The action color. UI primary #e52e40; brand-mark red #ff2442." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; height: 90px; border: 1px solid var(--border); }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 10px; font-family: var(--font-mono); opacity: 0.7; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:var(--coral-50);color:var(--coral-700)"><span class="name">50 · light</span><span class="hex">#fff0f2</span></div>
  <div class="sw" style="background:var(--coral-300);color:#fff"><span class="name">300</span><span class="hex">#f78a96</span></div>
  <div class="sw" style="background:var(--coral-500);color:#fff"><span class="name">500 · primary</span><span class="hex">#e52e40</span></div>
  <div class="sw" style="background:var(--coral-600);color:#fff"><span class="name">600 · hover</span><span class="hex">#c81d33</span></div>
  <div class="sw" style="background:var(--coral-brand);color:#fff"><span class="name">brand mark</span><span class="hex">#ff2442</span></div>
</div>
</body>
</html>
