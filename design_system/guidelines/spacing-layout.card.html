<!-- @dsCard group="Spacing" viewport="700x180" name="Layout Rails — Three-Pane Workbench" subtitle="280px sidebar · fluid chat · 580px canvas · 56px topbar." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--oats-default); font-family: var(--font-sans); padding: 18px; }
  .frame { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; height: 128px; display: flex; flex-direction: column; background: #fff; }
  .top { height: 22px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; font-size: 9px; color: var(--charcoal-light); }
  .body { flex: 1; display: flex; }
  .pane { display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: var(--font-mono); }
  .side { width: 150px; background: #fff; border-right: 1px solid var(--border); color: var(--charcoal-light); }
  .chat { flex: 1; background: var(--oats-default); color: var(--charcoal-light); }
  .canvas { width: 200px; background: #fff; border-left: 1px solid var(--border); color: var(--coral-500); }
</style>
</head>
<body>
<div class="frame">
  <div class="top">topbar · 56px</div>
  <div class="body">
    <div class="pane side">sidebar · 280px</div>
    <div class="pane chat">chat · fluid</div>
    <div class="pane canvas">canvas · 580px</div>
  </div>
</div>
</body>
</html>
