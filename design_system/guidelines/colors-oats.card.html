<!-- @dsCard group="Colors" viewport="700x150" name="Oats — Neutral Surfaces" subtitle="Warm alabaster canvas, sunken & raised surface tints." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px; display: flex; flex-direction: column; justify-content: flex-end; height: 90px; border: 1px solid var(--border); color: var(--charcoal-default); }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 10px; font-family: var(--font-mono); opacity: 0.6; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background:#ffffff"><span class="name">card</span><span class="hex">#ffffff</span></div>
  <div class="sw" style="background:var(--oats-light)"><span class="name">oats-light</span><span class="hex">#fcfaf9</span></div>
  <div class="sw" style="background:var(--oats-default)"><span class="name">oats · canvas</span><span class="hex">#faf8f5</span></div>
  <div class="sw" style="background:var(--oats-dark)"><span class="name">oats-dark</span><span class="hex">#f4f2ee</span></div>
  <div class="sw" style="background:var(--border)"><span class="name">border</span><span class="hex">#ebeae4</span></div>
</div>
</body>
</html>
