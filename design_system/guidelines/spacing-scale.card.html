<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid. Card padding 14–20px, pane padding 24px." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 22px; color: var(--charcoal-default); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--coral-500); border-radius: 3px; width: 100%; }
  .lbl { font-size: 10px; font-family: var(--font-mono); color: var(--charcoal-light); }
</style>
</head>
<body>
<div class="row">
  <div class="item" style="width:18px"><div class="bar" style="height:4px"></div><span class="lbl">1·4</span></div>
  <div class="item" style="width:18px"><div class="bar" style="height:8px"></div><span class="lbl">2·8</span></div>
  <div class="item" style="width:18px"><div class="bar" style="height:12px"></div><span class="lbl">3·12</span></div>
  <div class="item" style="width:22px"><div class="bar" style="height:16px"></div><span class="lbl">4·16</span></div>
  <div class="item" style="width:26px"><div class="bar" style="height:24px"></div><span class="lbl">6·24</span></div>
  <div class="item" style="width:30px"><div class="bar" style="height:32px"></div><span class="lbl">8·32</span></div>
  <div class="item" style="width:38px"><div class="bar" style="height:48px"></div><span class="lbl">12·48</span></div>
</div>
</body>
</html>
