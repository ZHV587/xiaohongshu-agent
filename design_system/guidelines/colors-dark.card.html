<!-- @dsCard group="Colors" viewport="700x160" name="Dark Theme Surfaces" subtitle="Deep-space surfaces with a brighter coral primary (#ff3b54)." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); padding: 0; }
  .stage { background:#0b0b0c; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #222226; color: #f5f5f7; }
  .name { font-size: 11px; font-weight: 600; }
  .hex { font-size: 9px; font-family: var(--font-mono); opacity: 0.6; }
</style>
</head>
<body>
<div class="stage dark">
  <div class="row">
    <div class="sw" style="background:#0b0b0c"><span class="name">background</span><span class="hex">#0b0b0c</span></div>
    <div class="sw" style="background:#131315"><span class="name">card</span><span class="hex">#131315</span></div>
    <div class="sw" style="background:#1e1e22"><span class="name">sunken</span><span class="hex">#1e1e22</span></div>
    <div class="sw" style="background:#ff3b54"><span class="name">primary</span><span class="hex">#ff3b54</span></div>
    <div class="sw" style="background:#2c1a1d;color:#ff3b54"><span class="name">accent</span><span class="hex">#2c1a1d</span></div>
  </div>
</div>
</body>
</html>
