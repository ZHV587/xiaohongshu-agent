<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="2xs → 2xl, 16px base. Steps for badges, meta, body, titles." -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 20px; color: var(--charcoal-default); }
  .r { display: flex; align-items: baseline; gap: 14px; padding: 4px 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--charcoal-light); width: 90px; flex-shrink: 0; }
  .ex { font-weight: 600; }
</style>
</head>
<body>
<div class="r"><span class="tok">2xl · 28</span><span class="ex" style="font-size:var(--text-2xl);font-family:var(--font-display);font-weight:800">爆款选题</span></div>
<div class="r"><span class="tok">lg · 18</span><span class="ex" style="font-size:var(--text-lg)">小红书文案助手</span></div>
<div class="r"><span class="tok">sm · 14</span><span class="ex" style="font-size:var(--text-sm);font-weight:400">正文默认字号 body</span></div>
<div class="r"><span class="tok">xs · 12</span><span class="ex" style="font-size:var(--text-xs);font-weight:400;color:var(--charcoal-light)">meta · 说明文字</span></div>
<div class="r"><span class="tok">2xs · 10</span><span class="ex" style="font-size:var(--text-2xs);font-weight:600;color:var(--charcoal-light)">徽章 / KBD 标签</span></div>
</body>
</html>
